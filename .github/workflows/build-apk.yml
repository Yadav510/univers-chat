name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build

      - name: Stage web assets for Capacitor (dist/)
        run: |
          rm -rf dist
          mkdir -p dist
          if [ -d ".output/public" ]; then
            cp -R .output/public/. dist/
          elif [ -d "build/client" ]; then
            cp -R build/client/. dist/
          elif [ -d "dist-client" ]; then
            cp -R dist-client/. dist/
          fi
          # Ensure an index.html exists (Capacitor requires it)
          if [ ! -f "dist/index.html" ]; then
            echo "<!doctype html><html><head><meta charset='utf-8'><title>Univers</title><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'></head><body><script>location.replace('https://universchat.lovable.app'+location.pathname+location.search+location.hash);</script></body></html>" > dist/index.html
          fi

      - name: Install Capacitor CLI + Android platform
        run: |
          bun add -d @capacitor/cli @capacitor/core @capacitor/android @capacitor/push-notifications
          bunx cap add android || echo "android already added"
          bunx cap sync android

      - name: Drop google-services.json (if provided as secret)
        if: env.GOOGLE_SERVICES_JSON != ''
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p android/app
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: univers-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
